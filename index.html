<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Tranport Data</title>
</head>
<body>
    <h1>Transport Data</h1>
    <div class="wheather">
        <h2>Data: </h2>
        <p>Wheather: </p>
        <p>Temperature: </p>
    </div>

    <div>
        <select name="uf" id="uf">
            <option value="">Selecione uma UF</option>
            <option value="12">Acre</option>
            <option value="27">Alagoas</option>
            <option value="16">Amapá</option>
            <option value="13">Amazonas</option>
            <option value="29">Bahia</option>
            <option value="23">Ceará</option>
            <option value="53">Distrito Federal</option>
            <option value="32">Espírito Santo</option>
            <option value="52">Goiás</option>
            <option value="21">Maranhão</option>
            <option value="51">Mato Grosso</option>
            <option value="50">Mato Grosso do Sul</option>
            <option value="31">Minas Gerais</option>
            <option value="15">Pará</option>
            <option value="25">Paraíba</option>
            <option value="28">Piauí</option>
            <option value="33">Rio de Janeiro</option>
            <option value="24">Rio Grande do Norte</option>
            <option value="43">Rio Grande do Sul</option>
            <option value="11">Rondônia</option>
            <option value="22">Roraima</option>
            <option value="42">Santa Catarina</option>
            <option value="35">São Paulo</option>
            <option value="26">Sergipe</option>
            <option value="17">Tocantins</option>
        </select>
        <select name="cities" id="cities">
            <option value="">Selecione uma cidade</option>
        </select>
    </div>


    <!-- API das cidades do brasil -->
    <script>
        let ufCities = []

        async function getCities(uf){
            console.log(uf)

            ufCities.splice(0, ufCities.length);

            let cities = await $.ajax({
                url: `https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`
            }).then(data =>{
                for(let i = 0; i < data.length; i++){
                    
                    
                    ufCities.push(data[i].nome);
                }
            })

            console.log("🚀 ~ getCities ~ ufCities:", ufCities)

            return ufCities;
        }
    </script>

    <!--API do tempo-->
    <script>

        async function getWheather(){
            var time = await $.ajax({
                url:`https://my.meteoblue.com/packages/basic-1h_basic-day?lat=47.56&lon=7.57&apikey=F0pblRgcHErWY49V`
            })

            return time;
        }

        getWheather().then(data => {
            console.log(data);
        }).catch(err => {
            console.error(err);
        })
    </script>

    <!--Script da página-->
    <script>
        $('#uf').change(function(){
            let uf = $(this).val();
            getCities(uf).then(cities => {
                document.createElement('option');
            
                if (cities.length > 0){
                    $('#cities').html('<option value="">Selecione uma cidade</option>');
                }

                for(let i = 0; i<cities.length; i++){
                    $('#cities').append(`<option value="${cities[i]}">${cities[i]}</option>`)
                }
                
            }).catch(err => {
                console.error(err);
            })
        })
    </script>

</body>
</html>
